              - generic [ref=e239]:
                - heading "使用限制" [level=2] [ref=e240]
                - list [ref=e241]:
                  - listitem [ref=e242]:
                    - paragraph [ref=e243]: 联网搜索和工具调用不兼容，不可同时开启。
                  - listitem [ref=e244]:
                    - paragraph [ref=e245]: 单次 WebSocket 会话最长可持续 120 分钟，达到此上限后服务将主动关闭连接。
                  - listitem [ref=e246]:
                    - paragraph [ref=e247]: 模型会维护对话历史上下文，当对话轮次或累计时长超过以下限制时，将自动丢弃更早的历史信息。最大时长指模型上下文中能保留的音频或视频（图像帧）累计时长上限。
                    - blockquote [ref=e248]: 由于视频以抽帧方式输入（建议 1 帧/秒），视频最大时长即模型能保留的图像帧累计时长。例如 240 秒表示模型最多保留最近 240 秒内收到的帧，超过后更早的帧将被丢弃。
                    - blockquote [ref=e249]: qwen3-omni-flash-realtime 最大轮次为 8 轮，一般会先触及轮次限制，时长限制为模型的上下文长度限制，不再单独列出。
