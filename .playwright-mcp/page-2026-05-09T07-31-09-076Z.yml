            - listitem [ref=e2044]:
              - paragraph [ref=e2045]: 媒体播放器支持在加载媒体资源时指定开始播放进度
              - paragraph [ref=e2046]: 媒体播放器新增 [loadResourceWithPosition] 接口，支持加载媒体资源时指定开始播放进度，单位为毫秒。
              - paragraph [ref=e2047]:
                - text: 相关 API 请参考
                - link "loadResourceWithPosition" [ref=e2048] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/loadResourceWithPosition.html
            - listitem [ref=e2049]:
              - paragraph [ref=e2050]: 新增开启或关闭拉流对齐功能
              - paragraph [ref=e2051]: 该功能常用于 KTV 等需要混流对齐的场景，当拉流端播放时，通过 [setPlayStreamsAlignmentProperty] 接口控制播放的实时音视频流是否需要精准对齐。若需要，则拉取的所有流中包含精准对齐参数的会进行对齐；若不需要，则所有流都不对齐。
              - paragraph [ref=e2052]:
                - text: 相关 API 请参考
                - link "setPlayStreamsAlignmentProperty" [ref=e2053] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/setPlayStreamsAlignmentProperty.html
            - listitem [ref=e2054]:
              - paragraph [ref=e2055]: 新增稳态语音检测功能
              - paragraph [ref=e2056]: 通过该功能可以判断一定时间内是否有人对着麦克风说话，用于检测采集后或音频前处理后的音频数据是人声还是噪声。
