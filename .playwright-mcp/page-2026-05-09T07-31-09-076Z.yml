              - paragraph [ref=e697]: 注意：如需使用该功能，请联系 ZEGO 技术支持。
              - paragraph [ref=e698]: 控制本端客户端编码兼容范围为房间内所有推流用户或所有用户，即当指定范围内存在用户不支持 H.265 时，本端客户端编码动态回退。
