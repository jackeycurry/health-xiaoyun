            - listitem [ref=e943]:
              - paragraph [ref=e944]: 房间实时消息支持发送透传消息
              - paragraph [ref=e945]: 支持向指定的客户端或客户服务器发送房间实时消息；消息类型分为 “普通消息”、“有序消息”，其中后者保证严格按照顺序接收消息。该功能适用于主播需要管理房间内的麦位等场景中，例如：
              - list [ref=e946]:
                - listitem [ref=e947]:
                  - paragraph [ref=e948]: 通过主播客户端，向需要闭麦的用户发送消息，接到消息的客户端进行闭麦。
                - listitem [ref=e949]:
                  - paragraph [ref=e950]: 主播希望将某用户踢出房间时，通过主播客户端，向对方的客户服务器发送消息、并踢出该用户。
              - paragraph [ref=e951]:
                - text: 相关 API 请参考
                - link "sendTransparentMessage" [ref=e952] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineIM/sendTransparentMessage.html
            - listitem [ref=e953]:
              - paragraph [ref=e954]: 自动混流支持设置水位
              - paragraph [ref=e955]: 注意：
            - listitem [ref=e956]:
              - paragraph [ref=e957]: 该功能默认不开启，即服务端使用默认的配置值。
            - listitem [ref=e958]:
              - paragraph [ref=e959]: 该功能会增大延迟，请酌情使用。
              - paragraph [ref=e960]: 自动混流接口支持设置水位，控制混流服务器拉流缓存的自适应调整的区间范围下限，以便在“混流耗时”和“推流端不稳定导致的画面卡顿”之间保持平衡。该功能设置后，仅对新的输入流生效，对于已经开始混流的输入流不生效。
              - paragraph [ref=e961]: 例如实时合唱 KTV 场景中，推流端网络轻微波动可能会导致混流卡顿，此时观众观看时也会有较高概率出现卡顿。通过调节水位下限，可以优化观众端卡顿问题，但会增大延迟。
              - paragraph [ref=e962]:
                - text: 相关 API 请参考
                - link "ZegoAutoMixerTask > minPlayStreamBufferLength" [ref=e963] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoAutoMixerTask/minPlayStreamBufferLength.html
            - listitem [ref=e964]:
              - paragraph [ref=e965]: 混流支持输入直播协议流
              - paragraph [ref=e966]: 新增支持将直播流作为输入流，进行混流处理；直播输入流的 URL 支持 RTMP 和 HTTP-FLV 两种协议。该功能适用于将主播连麦的RTC 画面流与云端体育直播流、游戏直播画面流等进行混合，实现游戏或体育直播解说的场景中。
            - listitem [ref=e967]:
              - paragraph [ref=e968]: 混流支持自定义音频偏移值
              - paragraph [ref=e969]: 在使用自定义音视频采集功能、且对应的采集源音频延迟不一致的情况下，可以在混流时自定义音频偏移值，从而实现混流输出后的音视频对齐，保证观众端的体验。
              - paragraph [ref=e970]:
                - text: 相关 API 请参考
                - link "ZegoMixerInput > advancedConfig" [ref=e971] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMixerInput/advancedConfig.html
            - listitem [ref=e972]:
              - paragraph [ref=e973]: 音效播放器支持分别设置推流音量、本地播放音量
              - paragraph [ref=e974]: 音效播放器支持分别设置推流音量、本地播放音量，保证本端和远端的音量大小都处于合适的区间。
              - paragraph [ref=e975]:
                - text: 相关 API 请参考
                - link "ZegoAudioEffectPlayer > setPublishVolume" [ref=e976] [cursor=pointer]:
