                - text: ","
                - link "setMinVideoResolutionForTrafficControl" [ref=e1337] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePublisher/setMinVideoResolutionForTrafficControl.html
          - paragraph [ref=e1338]:
            - strong [ref=e1339]: 改进优化
          - list [ref=e1340]:
            - listitem [ref=e1341]:
              - paragraph [ref=e1342]: 优化 SDK 内存占用
              - paragraph [ref=e1343]: 删除 SDK 内部一些没必要的内存申请，优化 SDK 内存使用率，相比上个版本，内存使用率减少了 10% 左右。
          - paragraph [ref=e1344]:
            - strong [ref=e1345]: 问题修复
          - list [ref=e1346]:
            - listitem [ref=e1347]: 修复游戏语音在某些情况下收听异常的问题
          - paragraph [ref=e1348]:
            - strong [ref=e1349]: 废弃删除
          - list [ref=e1350]:
            - listitem [ref=e1351]:
              - paragraph [ref=e1352]: 从 3.4.2 版本开始，废弃了对 iOS 11.0 以下版本的支持，iOS Deployment Target（最低支持版本）提升到 iOS 11.0
              - paragraph [ref=e1353]:
                - text: 具体说明，请参考
                - link "App Store submission requirement starts April 25" [ref=e1354] [cursor=pointer]:
                  - /url: https://developer.apple.com/news/?id=jd9wcyov
                - text: 及
                - link "Xcode 14 Release Notes" [ref=e1355] [cursor=pointer]:
                  - /url: https://developer.apple.com/documentation/xcode-release-notes/xcode-14-release-notes#Build-System
                - text: 。
            - listitem [ref=e1356]:
              - paragraph [ref=e1357]: 从 3.4.2 版本开始，iOS SDK 不再支持 32 位 armv7 架构
              - paragraph [ref=e1358]:
                - text: 具体说明，请参考
