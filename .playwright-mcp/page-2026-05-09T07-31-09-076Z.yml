          - paragraph [ref=e540]:
            - strong [ref=e541]: 发布日期： 2025-01-21
          - paragraph [ref=e542]:
            - strong [ref=e543]: 新增功能
          - list [ref=e544]:
            - listitem [ref=e545]:
              - paragraph [ref=e546]: 独唱场景下支持动态响度均衡功能
              - paragraph [ref=e547]: 开启动态响度均衡后，根据媒体播放器伴奏的实时表现，SDK 动态调整人声响度，使人声与伴奏响度时刻保持恰当比例，提升人声与伴奏融合度，观众体验更佳，适用于实时 KTV 的独唱场景。
              - paragraph [ref=e548]:
                - text: 相关 API 请参考
                - link "enableAuxBgmBalance" [ref=e549] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePublisher/enableAuxBgmBalance.html
          - paragraph [ref=e550]:
            - strong [ref=e551]: 改进优化
          - list [ref=e552]:
            - listitem [ref=e553]:
              - paragraph [ref=e554]: 优化 CDN 域名解析逻辑，避免阻塞线程
              - paragraph [ref=e555]: CDN 推拉流的域名解析逻辑，由同步改为异步操作，避免阻塞线程。
            - listitem [ref=e556]:
              - paragraph [ref=e557]: 降低首帧延迟，提升用户秒开体验
              - paragraph [ref=e558]: 针对首次运行 ZEGO Express SDK 的设备，可降低进房耗时、推拉流耗时，提升用户秒开体验。
