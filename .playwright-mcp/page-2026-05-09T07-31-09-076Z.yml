          - paragraph [ref=e1039]:
            - strong [ref=e1040]: 改进优化
          - list [ref=e1041]:
            - listitem [ref=e1042]:
              - paragraph [ref=e1043]: 优化网络测速的期望推、拉流码率上限
              - paragraph [ref=e1044]: 优化网络测速的期望推、拉流码率上限，提升至 15M。开发者可以在推拉流前，检查音视频质量与当前网络的匹配程度，以保证通话质量稳定。
              - paragraph [ref=e1045]:
                - text: 相关 API 请参考
                - link "startNetworkSpeedTest" [ref=e1046] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineUtilities/startNetworkSpeedTest.html
            - listitem [ref=e1047]:
              - paragraph [ref=e1048]: 优化拉流时，接收远端用户音视频数据的 [muteAll] 接口逻辑
              - paragraph [ref=e1049]:
                - text: 注意：新增接口
                - link "muteAllPlayAudioStreams" [ref=e1050] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/muteAllPlayAudioStreams.html
                - text: 、
                - link "muteAllPlayVideoStreams" [ref=e1051] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/muteAllPlayVideoStreams.html
                - text: 与旧接口
                - link "muteAllPlayStreamAudio" [ref=e1052] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/muteAllPlayStreamAudio.html
                - text: 、
                - link "muteAllPlayStreamVideo" [ref=e1053] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/muteAllPlayStreamVideo.html
                - text: 之间不能混用。
              - paragraph [ref=e1054]:
                - text: 新增接口
                - link "muteAllPlayAudioStreams" [ref=e1055] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/muteAllPlayAudioStreams.html
                - text: 、
                - link "muteAllPlayVideoStreams" [ref=e1056] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/muteAllPlayVideoStreams.html
                - text: 接口，用于在拉流时接收所有远端用户的音视频数据；同时支持通过
                - link "mutePlayStreamAudio" [ref=e1057] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/mutePlayStreamAudio.html
                - text: 、
                - link "mutePlayStreamVideo" [ref=e1058] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/mutePlayStreamVideo.html
                - text: 接口，单独控制指定的流的接收状态。
              - paragraph [ref=e1059]:
                - text: 旧接口
                - link "muteAllPlayStreamAudio" [ref=e1060] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/muteAllPlayStreamAudio.html
                - text: 、
                - link "muteAllPlayStreamVideo" [ref=e1061] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/muteAllPlayStreamVideo.html
                - text: 调用后，无法单独控制指定流的接收状态。
              - paragraph [ref=e1062]:
                - text: 相关 API 请参考
                - link "muteAllPlayAudioStreams" [ref=e1063] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/muteAllPlayAudioStreams.html
                - text: ","
                - link "muteAllPlayVideoStreams" [ref=e1064] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/muteAllPlayVideoStreams.html
                - text: ","
                - link "mutePlayStreamAudio" [ref=e1065] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/mutePlayStreamAudio.html
                - text: ","
                - link "mutePlayStreamVideo" [ref=e1066] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/mutePlayStreamVideo.html
            - listitem [ref=e1067]:
              - paragraph [ref=e1068]: 媒体播放器支持仅播放视频或音频，不额外消耗解码性能
              - paragraph [ref=e1069]: 注意：播放过程中，如果修改了媒体流类型，会在下一次播放时生效。
              - paragraph [ref=e1070]:
                - text: 使用媒体播放器播放音视频文件时，支持通过
                - link "setPlayMediaStreamType" [ref=e1071] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/setPlayMediaStreamType.html
                - text: 接口，设置为“仅播放音频” 或“仅播放视频”，不消耗音视频解码性能。
              - paragraph [ref=e1072]:
                - text: 相关 API 请参考
                - link "setPlayMediaStreamType" [ref=e1073] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/setPlayMediaStreamType.html
          - paragraph [ref=e1074]:
            - strong [ref=e1075]: 问题修复
          - list [ref=e1076]:
            - listitem [ref=e1077]:
              - paragraph [ref=e1078]: 修复拉流时，偶现无声音的问题
            - listitem [ref=e1079]:
              - paragraph [ref=e1080]: 修复多房间断网的异常情况下，多次调用 [logoutRoom]、[loginRoom] 接口，导致后续登录房间失败的问题
            - listitem [ref=e1081]:
              - paragraph [ref=e1082]: 修复房间重连失败的情况下，可能出现频繁重试的问题
          - separator [ref=e1083]
          - heading "3.9.0 版本" [level=2] [ref=e1084]: 3.9.0 版本
          - paragraph [ref=e1085]:
            - strong [ref=e1086]: 发布日期： 2023-09-18
          - paragraph [ref=e1087]:
            - strong [ref=e1088]: 新增功能
          - list [ref=e1089]:
            - listitem [ref=e1090]:
              - paragraph [ref=e1091]: 新增附带时间戳的 SEI 回调
              - paragraph [ref=e1092]:
                - text: 相关 API 请参考
                - link "onPlayerRecvMediaSideInfo" [ref=e1093] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPlayerRecvMediaSideInfo.html
            - listitem [ref=e1094]:
              - paragraph [ref=e1095]: 直推 CDN 支持在推流过程中更新 CDN 地址
              - paragraph [ref=e1096]:
                - text: 相关 API 请参考
                - link "enablePublishDirectToCdn" [ref=e1097] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPublisherDummyCaptureImagePathError.html
            - listitem [ref=e1098]:
              - paragraph [ref=e1099]: 支持均衡型 AI 降噪模式
              - paragraph [ref=e1100]: 注意：当前官网 SDK 不包含此功能，如有需要，请联系 ZEGO 技术支持特殊编包。
              - paragraph [ref=e1101]:
                - text: 支持均衡型 AI 降噪模式，与原有模式相比，在相同的人声保真效果前提下，噪音抑制效果明显提升，可以达到干净无噪音或不扰人的程度；但性能消耗稍微增加。适用于街道、马路、市场等较为嘈杂（信噪比低）的户外环境中，详情请参考
                - link "场景化 AI 降噪" [ref=e1102] [cursor=pointer]:
                  - /url: /real-time-video-flutter/audio/scenario-based-ai-noise-reduction
                - text: 。
              - paragraph [ref=e1103]:
                - text: 相关 API 请参考
                - link "ZegoANSMode > ZegoANSModeAIBalanced" [ref=e1104] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoANSMode.html
          - paragraph [ref=e1105]:
            - strong [ref=e1106]: 改进优化
          - list [ref=e1107]:
            - listitem [ref=e1108]:
              - paragraph [ref=e1109]: 优化 [setLogConfig] 接口
              - paragraph [ref=e1110]:
                - text: 扩大
                - link "setLogConfig" [ref=e1111] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/setLogConfig.html
                - text: 接口的生命周期为 App 生命周期，且优先级高于
                - link "setEngineConfig" [ref=e1112] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/setEngineConfig.html
                - text: 接口中的配置。
              - paragraph [ref=e1113]:
                - text: 相关 API 请参考
                - link "setLogConfig" [ref=e1114] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/setLogConfig.html
                - text: 、
                - link "setEngineConfig" [ref=e1115] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/setEngineConfig.html
            - listitem [ref=e1116]:
              - paragraph [ref=e1117]: 优化 App 休眠时的重试规则
              - paragraph [ref=e1118]: 优化 App 休眠时的重试规则，登录房间和推拉流过程中，“App 休眠时间”也计入“最大允许重试时间”。
          - paragraph [ref=e1119]:
            - strong [ref=e1120]: 问题修复
          - list [ref=e1121]:
            - listitem [ref=e1122]:
              - paragraph [ref=e1123]: 修复音频外部采集模块切换音源时，会导致无声的问题
            - listitem [ref=e1124]:
              - paragraph [ref=e1125]: 修复发送流新增时，极小概率出现失败的问题
            - listitem [ref=e1126]:
              - paragraph [ref=e1127]: 修复音效播放器偶现崩溃的问题
            - listitem [ref=e1128]:
              - paragraph [ref=e1129]:
                - text: 修复调用
                - link "sendAudioSideInfo" [ref=e1130] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePublisher/sendAudioSideInfo.html
                - text: 接口发送音频次要消息，接收端 10s 左右才能收到消息的问题
            - listitem [ref=e1131]:
              - paragraph [ref=e1132]: 修复网宿 CDN 在直推情况下，停推 TCP 断连耗时固定为 500 ms 的问题
          - separator [ref=e1133]
          - heading "3.8.1 版本" [level=2] [ref=e1134]: 3.8.1 版本
          - paragraph [ref=e1135]:
            - strong [ref=e1136]: 发布日期： 2023-08-18
          - paragraph [ref=e1137]:
            - strong [ref=e1138]: 新增功能
          - list [ref=e1139]:
            - listitem [ref=e1140]:
              - paragraph [ref=e1141]: 新增支持“智能云代理”模式
              - paragraph [ref=e1142]: 注意：如需使用该功能，请联系 ZEGO 技术支持。
              - paragraph [ref=e1143]:
                - text: 开发者设置“智能云代理”模式后，在 RTC 或 L3 拉流时，会优先使用直连网络模式进行尝试。如果直连网络不可用、且当前是蜂窝网络，则继续留在直连模式重试；如果直连网络不可用、且当前是非蜂窝网络，则切到云代理模式，详情请参考
                - link "云代理" [ref=e1144] [cursor=pointer]:
                  - /url: /real-time-voice-flutter/communication/cloud-proxy
                - text: 。
            - listitem [ref=e1145]:
              - paragraph [ref=e1146]: 媒体播放器支持设置网络资源的 Http Headers
              - paragraph [ref=e1147]: 媒体播放器支持设置网络资源的 Http Headers，开发者可基于该配置，自定义限定网络资源的访问方式，加强资源的安全防护。
              - paragraph [ref=e1148]:
                - text: 相关 API 请参考
                - link "setHttpHeader" [ref=e1149] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/setHttpHeader.html
            - listitem [ref=e1150]:
              - paragraph [ref=e1151]: 游戏语音支持配置 3D 音效距离的衰减范围、以及单条流的发声范围
              - paragraph [ref=e1152]: 在游戏语音场景中：
              - list [ref=e1153]:
                - listitem [ref=e1154]:
                  - text: 支持通过
                  - link "setAudioReceiveRange" [ref=e1155] [cursor=pointer]:
                    - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoRangeAudio/setAudioReceiveRange.html
                  - text: 接口，设置 3D 音效距离的衰减范围区间 [min, max]。距离小于 min 时，音量不会随着距离的增加而衰减；距离大于 max 时，将无法听到对方的声音。
                - listitem [ref=e1156]:
                  - text: 支持通过
                  - link "setStreamVocalRange" [ref=e1157] [cursor=pointer]:
                    - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoRangeAudio/setStreamVocalRange.html
                  - text: 接口，设置单条流的发声范围区间 [min, max]。
            - listitem [ref=e1158]:
              - paragraph [ref=e1159]: 支持按推流通道回调相关的事件活动
              - paragraph [ref=e1160]:
                - link "onPublisherSendAudioFirstFrame" [ref=e1161] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPublisherSendAudioFirstFrame.html
                - text: 回调函数，新增通道 channel 参数，支持多通道监听推流发送首帧信息。
              - paragraph [ref=e1162]:
                - text: 相关 API 请参考
                - link "onPublisherSendAudioFirstFrame" [ref=e1163] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPublisherSendAudioFirstFrame.html
          - paragraph [ref=e1164]:
            - strong [ref=e1165]: 改进优化
          - list [ref=e1166]:
            - listitem [ref=e1167]:
              - paragraph [ref=e1168]: 优化媒体播放器加载资源的 URL 长度，最大支持 2048 字节
            - listitem [ref=e1169]:
              - paragraph [ref=e1170]: 优化媒体播放器 SEI 信息与相应帧数据的回调同步，保证 SEI 和画面的一致性
          - paragraph [ref=e1171]:
            - strong [ref=e1172]: 问题修复
          - list [ref=e1173]:
            - listitem [ref=e1174]: 修复使用 Token 鉴权时，在 [createEngine] 之后、[destroyEngine] 之前变更了 userID，可能导致推拉流失败的问题
          - paragraph [ref=e1175]:
            - strong [ref=e1176]: 废弃删除
          - list [ref=e1177]:
            - listitem [ref=e1178]:
              - paragraph [ref=e1179]: 废弃了一些 API 接口
              - paragraph [ref=e1180]: 在 3.8.1 版本，对以下 API 接口进行废弃变更。
              - list [ref=e1181]:
                - listitem [ref=e1182]:
                  - text: 废弃了原有的 [onPublisherSendAudioFirstFrame] 回调接口，替换为同名的
                  - link "onPublisherSendAudioFirstFrame" [ref=e1183] [cursor=pointer]:
                    - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPublisherSendAudioFirstFrame.html
                  - text: 回调，并新增通道 channel 参数，支持按推流通道回调相关的事件活动。
                - listitem [ref=e1184]:
                  - link "ZegoRangeAudio" [ref=e1185] [cursor=pointer]:
                    - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoRangeAudio-class.html
                  - text: 类的成员函数：
                  - list [ref=e1186]:
                    - listitem [ref=e1187]:
                      - text: 废弃了原有的 [setAudioReceiveRange] 接口，替换为同名的
                      - link "setAudioReceiveRange" [ref=e1188] [cursor=pointer]:
                        - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoRangeAudio/setAudioReceiveRange.html
                      - text: 接口，并扩展参数
                      - link "ZegoReceiveRangeParam" [ref=e1189] [cursor=pointer]:
                        - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoReceiveRangeParam-class.html
                      - text: 类型，支持设置范围语音的音频接收范围。
                    - listitem [ref=e1190]:
                      - text: 废弃了原有的 [setStreamVocalRange] 接口，替换为同名的
                      - link "setStreamVocalRange" [ref=e1191] [cursor=pointer]:
                        - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoRangeAudio/setStreamVocalRange.html
                      - text: 接口，并扩展参数
                      - link "ZegoVocalRangeParam" [ref=e1192] [cursor=pointer]:
                        - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoVocalRangeParam-class.html
                      - text: 类型，支持设置范围语音的单条流发声范围。
              - paragraph [ref=e1193]:
                - text: API 接口变更后可能存在兼容性问题，详情请参考
                - link "3.8.1 及以上版本升级指南" [ref=e1194] [cursor=pointer]:
                  - /url: /real-time-voice-flutter/client-sdk/upgrade-guide/upgrade-to-v3-81
                - text: 。
          - separator [ref=e1195]
          - heading "3.7.0 版本" [level=2] [ref=e1196]: 3.7.0 版本
          - paragraph [ref=e1197]:
            - strong [ref=e1198]: 发布日期： 2023-07-28
          - paragraph [ref=e1199]:
            - strong [ref=e1200]: 改进优化
          - list [ref=e1201]:
            - listitem [ref=e1202]:
              - paragraph [ref=e1203]: 优化 SDK 内部逻辑，减少 400KB ~ 600KB 的内存占用
            - listitem [ref=e1204]:
              - paragraph [ref=e1205]: 在断网导致的推拉流重试状态中，支持回调本地网络质量
              - paragraph [ref=e1206]:
                - text: 相关 API 请参考
                - link "onNetworkQuality" [ref=e1207] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onNetworkQuality.html
            - listitem [ref=e1208]:
