              - paragraph [ref=e685]: 注意：若某条流设置为允许审核，如果开发者没有发起审核任务，这条流也不会被送审。
              - paragraph [ref=e686]: 当调用审核接口时，默认会对房间内的所有流进行审核。如果客户端要控制某条流不可以被送审，可以在调用 [startPublishingStream] 接口开始推流时，将送审标识 [streamCensorFlag] 参数设置为 1（不允许）。
              - paragraph [ref=e687]:
                - text: 相关 API 请参考
                - link "startPublishingStream" [ref=e688] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePublisher/startPublishingStream.html
                - text: ","
                - link "ZegoPublisherConfig > streamCensorFlag" [ref=e689] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoPublisherConfig/streamCensorFlag.html
            - listitem [ref=e690]:
              - paragraph [ref=e691]: 媒体播放器播放倍速最低支持至 0.3 倍速
              - paragraph [ref=e692]: 媒体播放器的播放速度区间从 [0.5,4.0]，扩大为 [0.3,4.0]，更多内容请参考 [媒体播放器] 。
