                - text: 。
          - separator [ref=e1360]
          - heading "3.3.1 版本" [level=2] [ref=e1361]: 3.3.1 版本
          - paragraph [ref=e1362]:
            - strong [ref=e1363]: 发布日期： 2023-03-24
          - paragraph [ref=e1364]:
            - strong [ref=e1365]: 问题修复
          - list [ref=e1366]:
            - listitem [ref=e1367]: 修复在部分场景下，Android 硬件耳返失效的问题
          - separator [ref=e1368]
          - heading "3.3.0 版本" [level=2] [ref=e1369]: 3.3.0 版本
          - paragraph [ref=e1370]:
            - strong [ref=e1371]: 发布日期： 2023-03-20
          - paragraph [ref=e1372]:
            - strong [ref=e1373]: 新增功能
          - list [ref=e1374]:
            - listitem [ref=e1375]:
              - paragraph [ref=e1376]: 支持外放场景下的人声增强效果
              - paragraph [ref=e1377]: 在外放场景中，设备的麦克风与扬声器过近，容易导致人声模糊或沉闷。在该场景下，人声增强可以有效提升人声清晰度并改善沉闷感，因此在外放场景下，建议开启该功能。
              - paragraph [ref=e1378]: 为实现外放场景下的人声增强效果，可开启人声增强音效并设置增强等级，增强等级推荐配置为 4，可用于 KTV 外放场景下，精细控制人声效果。
              - paragraph [ref=e1379]:
                - text: 相关 API 请参考
                - link "enableSpeechEnhance" [ref=e1380] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePreprocess/enableSpeechEnhance.html
            - listitem [ref=e1381]:
              - paragraph [ref=e1382]: 在自定义音频采集和 SDK 内部渲染模式下，支持自适应设备采集渲染延迟和回声消除（AEC）功能
              - paragraph [ref=e1383]: 注意：如需使用该功能，请联系 ZEGO 技术支持。
              - paragraph [ref=e1384]: 在自定义音频采集和 SDK 内部渲染模式下，支持混音自适应对齐和 AEC 功能，可使在实现 KTV 场景下的合唱时，达到更好的效果。
            - listitem [ref=e1385]:
              - paragraph [ref=e1386]: 游戏语音支持自定义设置发声模式和收听模式
              - paragraph [ref=e1387]:
                - text: 游戏语音支持自定义设置发声模式和收听模式，可用于实现加入小队后，需屏蔽非范围内的同一小队玩家的场景，详情请参考
                - link "游戏语音" [ref=e1388] [cursor=pointer]:
                  - /url: /real-time-voice-flutter/communication/range-audio
                - text: 。
              - paragraph [ref=e1389]:
                - text: 相关 API 请参考
                - link "setRangeAudioCustomMode" [ref=e1390] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoRangeAudio/setRangeAudioCustomMode.html
            - listitem [ref=e1391]:
              - paragraph [ref=e1392]: 场景化音视频配置新增 [StandardVoiceCall] 标准语音通话场景
              - paragraph [ref=e1393]:
                - text: 场景化音视频配置新增 [StandardVoiceCall] 标准语音通话场景，适用于 1v1 纯语音通话场景，详情请参考
                - link "场景化音视频配置" [ref=e1394] [cursor=pointer]:
                  - /url: /real-time-voice-flutter/quick-start/scenario-based-audio-video-configuration
                - text: 。
              - paragraph [ref=e1395]:
                - text: 相关 API 请参考
                - link "setRoomScenario" [ref=e1396] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/setRoomScenario.html
          - paragraph [ref=e1397]:
            - strong [ref=e1398]: 改进优化
          - list [ref=e1399]:
            - listitem [ref=e1400]:
              - paragraph [ref=e1401]: 优化 KTV 场景的回声消除（AEC）效果
              - paragraph [ref=e1402]: 针对 KTV 场景的 AEC 优化，实现了：
              - list [ref=e1403]:
