              - paragraph [ref=e1493]: 注意：如需使用该功能，请联系 ZEGO 技术支持，此功能目前只支持 Android 平台、iOS 平台、 macOS 平台和 Windows 平台。
              - paragraph [ref=e1494]:
                - text: 场景化 AI 降噪功能，在之前针对所有非人声进行降噪的基础上，新增支持在音乐场景下的降噪能力，通过识别音乐，智能调整降噪效果还原音乐音质。SDK 会实时对麦克风输入内容进行音乐检测，在声卡、弹唱或近场音乐场景下，自动调整降噪等级，保证音乐的高保真音质，详情请参考
                - link "场景化 AI 降噪" [ref=e1495] [cursor=pointer]:
                  - /url: /real-time-voice-flutter/audio/scenario-based-ai-noise-reduction
                - text: 文档。
            - listitem [ref=e1496]:
              - paragraph [ref=e1497]: 新增房间维度的场景 Scenario
              - paragraph [ref=e1498]:
                - text: 为方便开发者快速接入，降低开发者接入门槛，SDK 提供多种预设场景。开发者可根据所需场景，选择对应的房间模式
                - link "ZegoScenario" [ref=e1499] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoScenario.html
                - text: ，SDK 将自动应用适合该场景的音视频编解码器、音视频参数、流控策略等配置，从而快速实现该场景下的最佳效果。
              - paragraph [ref=e1500]:
                - text: 当前支持场景包括秀场直播、KTV、标准 1v1 音视频通话、高画质 1v1 音视频通话、标准语聊房、高音质语聊房（Web 端暂不支持高品质语聊房场景及 KTV 场景），详情请参考
                - link "场景化音视频配置" [ref=e1501] [cursor=pointer]:
                  - /url: /real-time-voice-flutter/quick-start/scenario-based-audio-video-configuration
                - text: 文档。
              - paragraph [ref=e1502]:
                - text: 相关 API 请参考
                - link "setRoomScenario" [ref=e1503] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/setRoomScenario.html
            - listitem [ref=e1504]:
              - paragraph [ref=e1505]: 新增获取 GPS 信息开关接口
              - paragraph [ref=e1506]: 注意：该功能默认开启，如需关闭该功能，请联系 ZEGO 技术支持，此功能目前只支持 Android 平台、iOS 平台、 macOS 平台和 Windows 平台。
              - paragraph [ref=e1507]: 在 App 有获取地理位置权限的情况下，开发者可以选择是否允许 ZEGO SDK 获取系统缓存的 GPS 信息，默认进行获取。当开发者希望关闭该功能时，需要联系 ZEGO 技术支持进行设置。
          - paragraph [ref=e1508]:
