          - list [ref=e831]:
            - listitem [ref=e832]:
              - paragraph [ref=e833]: 使用 QUIC 协议进行 CDN 推拉流时，支持 0-RTT 建立连接
              - paragraph [ref=e834]: 注意：
            - listitem [ref=e835]:
              - paragraph [ref=e836]: 该功能的安全性与传统方式相比稍低，请酌情使用。
            - listitem [ref=e837]:
              - paragraph [ref=e838]: 使用该功能时，需要将 ZegoCDNConfig.protocol 设置为 “quic”。
              - paragraph [ref=e839]:
                - link "ZegoCDNConfig" [ref=e840] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoCDNConfig-class.html
                - text: 新增 quicConnectMode 属性，开发者在使用 QUIC 协议进行 CDN 推拉流时，可以设置为 QUIC 建连模式（即 quicConnectMode 取值为 1），0-RTT 建立连接，快速启用服务。目前已适配华为、网宿、腾讯等厂商的 CDN 直播产品。
              - paragraph [ref=e841]: 该功能默认不开启（即 quicConnectMode 默认为 0，表示正常建立连接）。
              - paragraph [ref=e842]:
                - text: 相关 API 请参考
                - link "ZegoCDNConfig > quicConnectMode" [ref=e843] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoCDNConfig/quicConnectMode.html
            - listitem [ref=e844]:
              - paragraph [ref=e845]: 支持设置转推 CDN 的超时时间，用于监控流是否存在
              - paragraph [ref=e846]: 注意：该功能只在发起转推时生效，转推过程中如果出现断连，SDK 会保持重试逻辑，此时无该回调通知。
              - paragraph [ref=e847]:
                - text: 发起转推任务时，支持通过
                - link "addPublishCdnUrl" [ref=e848] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePublisher/addPublishCdnUrl.html
                - text: 接口，设置转推 CDN 的超时时间，用于监控流是否存在。例如，开发者已经发起转推任务，但该条流还未开始推流，在超过设置的超时时间后，SDK 会返回一个流不存在的回调通知。
              - paragraph [ref=e849]: 该回调只会通知给转推发起者、而不是推流发起者。如果转推发起者和推流发起者不是同一个用户，建议开发者从服务端发起转推、并接收该通知。
              - paragraph [ref=e850]:
                - text: 相关 API 请参考
                - link "addPublishCdnUrl" [ref=e851] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePublisher/addPublishCdnUrl.html
            - listitem [ref=e852]:
              - paragraph [ref=e853]: 支持回调本地录制的质量数据
              - paragraph [ref=e854]:
                - link "ZegoDataRecordProgress" [ref=e855] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoDataRecordProgress-class.html
                - text: 新增 quality 属性，在本地录制过程中，通过该属性回调录制文件的帧率、码率等质量数据。
              - paragraph [ref=e856]:
