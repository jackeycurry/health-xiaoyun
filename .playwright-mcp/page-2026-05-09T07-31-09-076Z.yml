          - list [ref=e1510]:
            - listitem [ref=e1511]:
              - paragraph [ref=e1512]: 针对 1v1 纯 RTC 通话场景进行优化
              - paragraph [ref=e1513]: 注意：如需使用该功能，请联系 ZEGO 技术支持。
              - paragraph [ref=e1514]: 针对 1v1 通话场景进行了优化，适用在纯 RTC 场景下使用。
            - listitem [ref=e1515]:
