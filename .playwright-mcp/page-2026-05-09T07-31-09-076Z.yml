                    - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineCustomAudioIO/enableAlignedAudioAuxData.html
                  - text: 接口开启开关，最后通过
                  - link "onAlignedAudioAuxData" [ref=e1622] [cursor=pointer]:
                    - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onAlignedAudioAuxData.html
                  - text: ","
                  - link "enableAux" [ref=e1623] [cursor=pointer]:
                    - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/enableAux.html
                  - text: 回调获取媒体播放器的 PCM 数据，此时媒体播放器及 Mic 采集数据已对齐，且数据帧一一对应。
              - paragraph [ref=e1624]:
                - text: 相关 API 请参考
                - link "enableAlignedAudioAuxData" [ref=e1625] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineCustomAudioIO/enableAlignedAudioAuxData.html
                - text: ","
                - link "onAlignedAudioAuxData" [ref=e1626] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onAlignedAudioAuxData.html
                - text: ","
                - link "enableAux" [ref=e1627] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/enableAux.html
            - listitem [ref=e1628]:
              - paragraph [ref=e1629]: 支持使用 Flutter 框架开发 Windows 程序
          - paragraph [ref=e1630]:
            - strong [ref=e1631]: 改进优化
          - list [ref=e1632]:
            - listitem [ref=e1633]:
              - paragraph [ref=e1634]: 优化网络质量回调，感知远端用户异常状态
              - paragraph [ref=e1635]:
                - text: 当远端用户异常时，
                - link "onNetworkQuality" [ref=e1636] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onNetworkQuality.html
                - text: 每 2s 回调一次质量未知状态（ZegoStreamQualityLevel.Unknown 状态），当用户该状态持续 8s 后，则认为远端用户已异常断开，此时回调质量异常状态（ZegoStreamQualityLevel.Die 状态）。
              - paragraph [ref=e1637]:
                - text: 相关 API 请参考
                - link "onNetworkQuality" [ref=e1638] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onNetworkQuality.html
            - listitem [ref=e1639]:
              - paragraph [ref=e1640]: 优化网络质量回调，网络质量反馈更灵敏
              - paragraph [ref=e1641]: 推拉流质量回调会每隔 3s 回调一次质量最差的结果，当周期内出现严重的抖动或丢包时，能够立刻反馈出流质量差。
              - paragraph [ref=e1642]:
                - text: 相关 API 请参考
                - link "onPlayerQualityUpdate" [ref=e1643] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPlayerQualityUpdate.html
                - text: ","
                - link "onPublisherQualityUpdate" [ref=e1644] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPublisherQualityUpdate.html
                - text: ","
                - link "onNetworkQuality" [ref=e1645] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onNetworkQuality.html
            - listitem [ref=e1646]:
              - paragraph [ref=e1647]: 优化日志上报策略
              - paragraph [ref=e1648]: 优化日志上报策略，提高日志上传效率。
            - listitem [ref=e1649]:
              - paragraph [ref=e1650]: 优化了 AGC 的谐波检测算法
              - paragraph [ref=e1651]: AGC 新改进的谐波检测算法存在崩溃问题，现回退至老版本的谐波检测算法。
          - paragraph [ref=e1652]:
            - strong [ref=e1653]: 问题修复
          - list [ref=e1654]:
            - listitem [ref=e1655]: 修复网络模块极低概率崩溃的问题
          - separator [ref=e1656]
          - heading "2.21.1 版本" [level=2] [ref=e1657]: 2.21.1 版本
          - paragraph [ref=e1658]:
            - strong [ref=e1659]: 发布日期：2022.07.15
          - paragraph [ref=e1660]:
            - strong [ref=e1661]: 问题修复
          - list [ref=e1662]:
            - listitem [ref=e1663]: 修复纯音频场景发送 SEI 失败的问题
          - separator [ref=e1664]
          - heading "2.21.0 版本" [level=2] [ref=e1665]: 2.21.0 版本
          - paragraph [ref=e1666]:
            - strong [ref=e1667]: 发布日期：2022.07.12
          - paragraph [ref=e1668]:
            - strong [ref=e1669]: 新增功能
          - list [ref=e1670]:
            - listitem [ref=e1671]:
              - paragraph [ref=e1672]: 范围语音支持自定义距离更新频率
              - paragraph [ref=e1673]: SDK 默认的距离更新频率由 1s 改为 100ms，能够基本满足大部分开发者使用范围语音时的平滑衰减效果，优化了使用范围语音时声音衰减的体验，可以实现更平滑、自然的衰减效果。
              - paragraph [ref=e1674]:
                - text: 若希望与实际的业务效果进行更优的匹配，可调用
                - link "setPositionUpdateFrequency" [ref=e1675] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoRangeAudio/setPositionUpdateFrequency.html
                - text: 接口自行进行修改频率。
              - paragraph [ref=e1676]:
                - text: 相关 API 请参考
                - link "setPositionUpdateFrequency" [ref=e1677] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoRangeAudio/setPositionUpdateFrequency.html
            - listitem [ref=e1678]:
              - paragraph [ref=e1679]: 拉流接口增加 CDN Plus 拉流配置项
              - paragraph [ref=e1680]: 注意：若希望通过地区、用户等更多维度，从云端控制拉流方式，请联系 ZEGO 技术支持进行相关配置。
              - paragraph [ref=e1681]:
                - text: 拉流接口新增 CDNPlus 的拉流资源模式（ZegoStreamResourceMode），开发者可按流维度自行开启使用 CDNPlus 拉流。CDN Plus 拉流是比 CDN 拉流直播质量更高，但是价格接近 CDN 的一种性价比高的拉流方式，详情请参考
                - link "CDN Plus 拉流" [ref=e1682] [cursor=pointer]:
                  - /url: /live-streaming-android/introduction/overview
                - text: 。
              - paragraph [ref=e1683]:
                - text: 相关 API 请参考
                - link "startPlayingStream" [ref=e1684] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/startPlayingStream.html
          - paragraph [ref=e1685]:
            - strong [ref=e1686]: 改进优化
          - list [ref=e1687]:
            - listitem [ref=e1688]:
              - paragraph [ref=e1689]: 优化开启强制登录鉴权时，Token 异常的相关错误码
              - paragraph [ref=e1690]:
                - text: 新增 1002074、1002075、1002076、1002077、1002078、1002079、1002080 等错误码。开启强制登录鉴权后，如果 Token 错误时，会返回这些错误码，详情请参考
                - link "常见错误码" [ref=e1691] [cursor=pointer]:
                  - /url: /real-time-video-flutter/client-sdk/error-code
                - text: 中的详细解释和处理建议。
            - listitem [ref=e1692]:
              - paragraph [ref=e1693]: 实时合唱人声伴奏对齐优化
              - paragraph [ref=e1694]: 优化了 KTV 实时合唱场景中，人声和伴奏对齐能力。避免当客户端同时推人声和伴奏两条流时，因为设备播放的延迟，导致人声和伴奏不对齐，造成的体验下降。
          - paragraph [ref=e1695]:
            - strong [ref=e1696]: 问题修复
          - list [ref=e1697]:
            - listitem [ref=e1698]:
              - paragraph [ref=e1699]: 修复一个 L3 拉流失败的问题
              - paragraph [ref=e1700]: 修复 2.20.0 ~ 2.20.2 版本 SDK 采用 L3 拉流时，如果拉到的流是 2.15.0 及之前版本 SDK 推送的流，可能会失败的问题。
            - listitem [ref=e1701]:
              - paragraph [ref=e1702]: 修复一些自定义音频采集相关的错误
          - separator [ref=e1703]
          - heading "2.21.0-prerelease.1 版本" [level=2] [ref=e1704]
          - paragraph [ref=e1705]:
            - strong [ref=e1706]: 发布日期：2022.07.04
          - paragraph [ref=e1707]:
            - strong [ref=e1708]: 新增功能
          - list [ref=e1709]:
            - listitem [ref=e1710]: 支持使用 Flutter 框架开发 Web 程序
          - separator [ref=e1711]
          - heading "2.20.2 版本" [level=2] [ref=e1712]: 2.20.2 版本
          - paragraph [ref=e1713]:
            - strong [ref=e1714]: 发布日期：2022.06.20
          - paragraph [ref=e1715]:
            - strong [ref=e1716]: 问题修复
          - list [ref=e1717]:
            - listitem [ref=e1718]:
              - paragraph [ref=e1719]: 修复了一个概率性拉流失败的问题
            - listitem [ref=e1720]:
              - paragraph [ref=e1721]: 修复了在初始化 SDK 前，设置音频设备模式不生效的问题
          - separator [ref=e1722]
          - heading "2.20.0 版本" [level=2] [ref=e1723]: 2.20.0 版本
          - paragraph [ref=e1724]:
            - strong [ref=e1725]: 发布日期：2022.06.16
          - paragraph [ref=e1726]:
            - strong [ref=e1727]: 新增功能
          - list [ref=e1728]:
            - listitem [ref=e1729]:
              - paragraph [ref=e1730]: 媒体播放器支持设置声道
              - paragraph [ref=e1731]:
                - text: 在调用
                - link "createEngine" [ref=e1732] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/createEngine.html
                - text: 接口初始化引擎以及
                - link "createMediaPlayer" [ref=e1733] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineMediaPlayer/createMediaPlayer.html
                - text: 接口创建媒体播放器后，可以调用
                - link "setActiveAudioChannel" [ref=e1734] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/setActiveAudioChannel.html
                - text: 接口设置左声道、右声道或全部声道。初始化时，媒体播放器默认为全部声道。
              - paragraph [ref=e1735]:
                - text: 相关 API 请参考
                - link "setActiveAudioChannel" [ref=e1736] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/setActiveAudioChannel.html
            - listitem [ref=e1737]:
              - paragraph [ref=e1738]: 支持线性调整的音量增益
              - paragraph [ref=e1739]: 注意：如需使用该功能，请联系 ZEGO 技术支持。
              - paragraph [ref=e1740]: 提供新的音量增益方式，开发者可以根据实际需求选择合适的音量增益方式。
            - listitem [ref=e1741]:
              - paragraph [ref=e1742]: 支持设置流级别的音视频自动审核
              - paragraph [ref=e1743]: 注意：如需使用该功能，请联系 ZEGO 技术支持开通后台服务。
              - paragraph [ref=e1744]:
                - text: 在调用
                - link "startPublishingStream" [ref=e1745] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePublisher/startPublishingStream.html
                - text: 接口开始推流时，开发者可以设置 “ZegoStreamCensorshipMode” 参数，进行流级别的音视频自动审核，包含如涉黄、涉政等审核类型，以此降低开发者的接入难度和业务维护成本。
              - paragraph [ref=e1746]:
                - text: 相关 API 请参考
                - link "startPublishingStream" [ref=e1747] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePublisher/startPublishingStream.html
          - paragraph [ref=e1748]:
            - strong [ref=e1749]: 改进优化
          - list [ref=e1750]:
            - listitem [ref=e1751]:
              - paragraph [ref=e1752]: 开发者传入不存在的 AppID 时报错的错误码从 1002099 优化为 1001004
            - listitem [ref=e1753]:
              - paragraph [ref=e1754]: 优化回声消除，解决 KTV 等场景的吞音现象
            - listitem [ref=e1755]:
              - paragraph [ref=e1756]: 新增 1009013 错误码
              - paragraph [ref=e1757]: 表示消息输入长度超出限制。出现此错误码时，请检查输入内容长度或联系 ZEGO 技术支持扩展消息内容长度。
            - listitem [ref=e1758]:
              - paragraph [ref=e1759]: 新增 1017009 错误码
              - paragraph [ref=e1760]:
                - text: 在版权音乐初始化时，由于未设置 AppSign 或 Token，导致鉴权失败，会出现此错误码。此时，如果是使用 AppSign 鉴权，请在初始化 SDK 时传入 AppSign；如果是使用 Token 鉴权，在调用
                - link "initCopyrightedMusic" [ref=e1761] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoCopyrightedMusic/initCopyrightedMusic.html
                - text: 接口前，请调用
                - link "loginRoom" [ref=e1762] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineRoom/loginRoom.html
                - text: 接口并传入 Token，以供鉴权。
              - paragraph [ref=e1763]:
                - text: 相关 API 请参考
                - link "initCopyrightedMusic" [ref=e1764] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoCopyrightedMusic/initCopyrightedMusic.html
                - text: ","
                - link "loginRoom" [ref=e1765] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineRoom/loginRoom.html
          - paragraph [ref=e1766]:
            - strong [ref=e1767]: 问题修复
          - list [ref=e1768]:
            - listitem [ref=e1769]: 修复了自定义采集 AAC 音频格式的报错问题
          - separator [ref=e1770]
          - heading "2.19.0 版本" [level=2] [ref=e1771]: 2.19.0 版本
          - paragraph [ref=e1772]:
            - strong [ref=e1773]: 发布日期：2022.05.23
          - paragraph [ref=e1774]:
            - strong [ref=e1775]: 新增功能
          - list [ref=e1776]:
            - listitem [ref=e1777]:
              - paragraph [ref=e1778]: 直推 CDN 的流支持通过 L3 拉流
              - paragraph [ref=e1779]: 直推 CDN 时，在不改变推流方式的情况下，SDK 从客户的 CDN 源站拉流，通过 L3 将音视频内容分发给观众，通过 [ZegoResourceType] 控制源站资源。该功能常用于直播场景。
              - paragraph [ref=e1780]:
                - text: 相关 API 请参考
                - link "startPlayingStream" [ref=e1781] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePlayer/startPlayingStream.html
            - listitem [ref=e1782]:
              - paragraph [ref=e1783]: 音视频场景下支持 SEI 数据随音频帧同步
              - paragraph [ref=e1784]: 注意：目前只支持 RTC 场景，直推 CDN 和转推 CDN 场景下无效。
              - paragraph [ref=e1785]: 从 2.19.0 版本开始，支持在音视频场景下将 SEI（媒体补充增强信息）与音频帧同步发送。该功能常用于 SEI 与音频强相关的视频场景，例如实时 KTV。
              - paragraph [ref=e1786]: 在 2.19.0 之前版本中，SEI 数据是跟随视频帧数据一起发送，一般情况下视频帧率远低于音频帧率，导致混流对齐、伴奏对齐场景下等 SEI 精度/频率不足。
              - paragraph [ref=e1787]:
                - text: 相关 API 请参考
                - link "onPlayerRecvAudioSideInfo" [ref=e1788] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPlayerRecvAudioSideInfo.html
                - text: ","
                - link "sendAudioSideInfo" [ref=e1789] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePublisher/sendAudioSideInfo.html
          - paragraph [ref=e1790]:
            - strong [ref=e1791]: 改进优化
          - list [ref=e1792]:
            - listitem [ref=e1793]: 为了提高安全性，此版本将 curl 升级到 7.82.0
          - paragraph [ref=e1794]:
            - strong [ref=e1795]: 问题修复
          - list [ref=e1796]:
            - listitem [ref=e1797]:
              - paragraph [ref=e1798]: 修复了调用网络测速接口后立刻调用开始推流接口时，收不到网络测速回调的问题
            - listitem [ref=e1799]:
              - paragraph [ref=e1800]: 修复了特定安卓机型和特定蓝牙耳机搭配使用的情况下，开启采集时导致通话音量由蓝牙变成扬声器外放的问题
            - listitem [ref=e1801]:
              - paragraph [ref=e1802]: 修复了 iOS 无法在模拟器上运行的问题
          - separator [ref=e1803]
          - heading "2.18.0 版本" [level=2] [ref=e1804]: 2.18.0 版本
          - paragraph [ref=e1805]:
            - strong [ref=e1806]: 发布日期：2022-04-28
          - paragraph [ref=e1807]:
            - strong [ref=e1808]: 新增功能
          - list [ref=e1809]:
            - listitem [ref=e1810]:
              - paragraph [ref=e1811]: 新增 AI 降噪功能
              - generic [ref=e1814]:
                - generic [ref=e1815]: 注意
                - paragraph [ref=e1817]: AI 降噪目前会对麦克风采集的音乐有较大损伤，包括人通过麦克风唱歌的声音。如需使用该功能，请联系 ZEGO 技术支持。
              - paragraph [ref=e1818]: AI 降噪指的是 SDK 会对麦克风采集的声音进行降噪处理，在原有的稳态噪声正常处理的情况下，还会处理非稳态噪声，主要包括鼠标、键盘声、敲击、空调、厨房碗碟、嘈杂餐厅、环境风声、咳嗽、吹气 等非人声噪声。通过 [setANSMode] 接口中的 “ZegoANSMode” 参数设置 AI 降噪模式，并且可以实时调整降噪模式。
              - paragraph [ref=e1819]: 该功能常用于通话、会议等没有背景音乐的场景，例如普通音质语聊房、语音会议、语音开黑、一对一视频通话。
              - paragraph [ref=e1820]:
                - text: 相关 API 请参考
                - link "setANSMode" [ref=e1821] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePreprocess/setANSMode.html
            - listitem [ref=e1822]:
              - paragraph [ref=e1823]: 支持设置音效的播放速度
              - paragraph [ref=e1824]: 开始播放音效后， 调用 [SetPlaySpeed] 接口可以对音效设置四种播放速度（会同时设置本地播放速度和推流速度），分别为 0.5 倍速、原始速度、1.5 倍速和 2 倍速，默认为原始速度。
              - paragraph [ref=e1825]:
                - text: 相关 API 请参考
                - link "SetPlaySpeed" [ref=e1826] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoAudioEffectPlayer/setPlaySpeed.html
            - listitem [ref=e1827]:
              - paragraph [ref=e1828]: CDN 直播时支持使用 QUIC 协议推拉流
              - paragraph [ref=e1829]: QUIC 协议推拉流主要用于改善弱网环境下 CDN 直播质量不稳定的情况，但是改善有限，推荐使用低延时直播，享受高质量且低延时的直播服务。当前支持使用腾讯、网宿两家 CDN 直播产品的 QUIC 协议推流及拉流。
              - paragraph [ref=e1830]: 通过 [enablePublishDirectToCDN] 接口中的 “ZegoCDNConfig” 参数配置推流协议和 QUIC 版本，若想进行 QUIC 协议的自定义 CDN 拉流，需要通过 [startPlayingStream] 中的 “ZegoPlayerConfig“ 参数配置拉流协议和 QUIC 版本。
              - paragraph [ref=e1831]:
                - text: 相关 API 请参考
                - link "enablePublishDirectToCDN" [ref=e1832] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePublisher/enablePublishDirectToCDN.html
            - listitem [ref=e1833]:
              - paragraph [ref=e1834]: 支持监听推拉流的地址和协议相关信息
              - paragraph [ref=e1835]: 发起推流后，可以通过 [onPublisherStreamEvent] 回调实时监听推流状态，该回调会返回当前使用的推流地址、资源类型和协议相关信息。
              - paragraph [ref=e1836]: 发起拉流后，可以通过 [onPlayerStreamEvent] 回调实时监听拉流状态，该回调会返回当前使用的拉流地址、资源类型和协议相关信息。
              - paragraph [ref=e1837]:
                - text: 相关 API 请参考
                - link "onPublisherStreamEvent" [ref=e1838] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPublisherStreamEvent.html
                - text: ","
                - link "onPlayerStreamEvent" [ref=e1839] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPlayerStreamEvent.html
            - listitem [ref=e1840]:
              - paragraph [ref=e1841]: 支持通过 URL 设置混流水印和混流的输入音量
              - paragraph [ref=e1842]: 调用 startMixerTask 开启或更新混流任务，支持通过 “inputVolume” 分别设置混流输入音量。
              - paragraph [ref=e1843]:
                - text: 相关 API 请参考
                - link "startMixerTask" [ref=e1844] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineMixer/startMixerTask.html
            - listitem [ref=e1845]:
              - paragraph [ref=e1846]: 新增房间状态变化通知 [onRoomStateChanged]
              - paragraph [ref=e1847]: 当房间的连接状态发生变化时会触发 [onRoomStateChanged] 回调，通过“ZegoRoomStateChangedReason” 参数提供更加详细的连接状态及状态变化原因。
              - paragraph [ref=e1848]:
                - text: 相关 API 请参考
                - link "onRoomStateChanged" [ref=e1849] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onRoomStateChanged.html
          - paragraph [ref=e1850]:
            - strong [ref=e1851]: 改进优化
          - list [ref=e1852]:
            - listitem [ref=e1853]:
              - paragraph [ref=e1854]: 完善开始混流接口 [startMixerTask] 返回的错误码
              - paragraph [ref=e1855]:
                - text: 新增 1005000 错误码，表示未开通混流服务。出现此错误码时，请在
                - link "ZEGO 控制台" [ref=e1856] [cursor=pointer]:
                  - /url: https://console.zego.im
                - text: 自助开通混流服务（开通步骤请参考
                - link "项目管理 - 服务配置" [ref=e1857] [cursor=pointer]:
                  - /url: /console/service-configuration/enable-stream-mixing-service
                - text: 中的“混流”），或联系 ZEGO 技术支持开通。
              - paragraph [ref=e1858]:
                - text: 相关 API 请参考
                - link "startMixerTask" [ref=e1859] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineMixer/startMixerTask.html
          - paragraph [ref=e1860]:
            - strong [ref=e1861]: 问题修复
          - list [ref=e1862]:
            - listitem [ref=e1863]:
              - paragraph [ref=e1864]: 修复了某些平台使用 boringssl 加解密异常的问题
            - listitem [ref=e1865]:
              - paragraph [ref=e1866]: 修复了硬编失败后未快速回滚软编的问题
            - listitem [ref=e1867]:
              - paragraph [ref=e1868]: 修复了在使用 Android v2 embedded 时，android plugin binding 没有释放导致的内存泄漏问题
            - listitem [ref=e1869]:
              - paragraph [ref=e1870]: 修复了 iOS texture renderer 的临时 pixel buffer 引用未在销毁时释放导致的内存泄漏问题
          - separator [ref=e1871]
          - heading "2.17.2 版本" [level=2] [ref=e1872]: 2.17.2 版本
          - paragraph [ref=e1873]:
            - strong [ref=e1874]: 发布日期：2022-04-15
          - paragraph [ref=e1875]:
            - strong [ref=e1876]: 问题修复
          - list [ref=e1877]:
            - listitem [ref=e1878]:
              - paragraph [ref=e1879]: 修复了日志上报时，日志文件收集异常的问题
            - listitem [ref=e1880]:
              - paragraph [ref=e1881]: 修复了部分手机的回声消除问题
          - separator [ref=e1882]
          - heading "2.17.1 版本" [level=2] [ref=e1883]: 2.17.1 版本
          - paragraph [ref=e1884]:
            - strong [ref=e1885]: 发布日期：2022-03-18
          - paragraph [ref=e1886]:
            - strong [ref=e1887]: 新增功能
          - list [ref=e1888]:
            - listitem [ref=e1889]:
              - paragraph [ref=e1890]: 支持稳态语音设置检测周期参数
              - paragraph [ref=e1891]: 稳态语音默认检测周期为 3 秒，用户如需修改默认检测周期，可通过 [startAudioVADStableStateMonitor] 接口自定义检测周期参数。
              - paragraph [ref=e1892]:
                - text: 相关 API 请参考
                - link "startAudioVADStableStateMonitor" [ref=e1893] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineDevice/startAudioVADStableStateMonitor.html
            - listitem [ref=e1894]:
              - paragraph [ref=e1895]: 范围语音新增隐秘小队模式
              - paragraph [ref=e1896]: 新增枚举 [ZegoRangeAudioModeSecretTeam] 隐秘小队模式。在该模式下，同一房间下的用户，收听者既能与同一小队的人交流，也能听到所有在音频接收范围内且为全世界模式发声者的声音，如太空狼人杀游戏场景。
              - paragraph [ref=e1897]:
                - text: 相关 API 请参考
                - link "setRangeAudioMode" [ref=e1898] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoRangeAudio/setRangeAudioMode.html
            - listitem [ref=e1899]:
              - paragraph [ref=e1900]: 新增调试助手功能
              - paragraph [ref=e1901]: 注意：该功能仅在开发阶段使用，请勿在线上版本开启此功能。
              - paragraph [ref=e1902]: 新增 [enableDebugAssistant] 接口，开发者调用该接口开启调试助手功能，SDK 将会打印日志到控制台，并且在 SDK 其他接口的调用出现异常时，UI 会弹窗提示错误。
              - paragraph [ref=e1903]:
                - text: 相关 API 请参考
                - link "enableDebugAssistant" [ref=e1904] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/enableDebugAssistant.html
          - paragraph [ref=e1905]:
            - strong [ref=e1906]: 改进优化
          - list [ref=e1907]:
            - listitem [ref=e1908]:
              - paragraph [ref=e1909]: 优化了鉴权方式
              - paragraph [ref=e1910]:
                - text: 2.17.1 及以上版本，在创建引擎时将 AppSign 传空或不传，并且在登录房间时必须传入 Token，鉴权通过后即可使用实时音视频功能，具体请参考
                - link "使用 Token 鉴权" [ref=e1911] [cursor=pointer]:
                  - /url: /real-time-video-flutter/communication/using-token-authentication
                - text: 。
              - paragraph [ref=e1912]: 2.17.1 以下版本，在创建引擎时传入 AppSign，鉴权通过后即可使用实时音视频功能。
              - paragraph [ref=e1913]:
                - text: 相关 API 请参考
                - link "createEngineWithProfile" [ref=e1914] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/createEngineWithProfile.html
                - text: ","
                - link "loginRoom" [ref=e1915] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineRoom/loginRoom.html
          - paragraph [ref=e1916]:
            - strong [ref=e1917]: 问题修复
          - list [ref=e1918]:
            - listitem [ref=e1919]:
              - paragraph [ref=e1920]: 修复了字符串类型的参数命名长度超长时可能导致崩溃的问题
            - listitem [ref=e1921]:
              - paragraph [ref=e1922]: 修复了当推流端 App 从后台返回前端时，拉流端收不到卡顿结束事件 BreakResume 的问题
            - listitem [ref=e1923]:
              - paragraph [ref=e1924]: 修复了其他已知问题
            - listitem [ref=e1925]:
              - paragraph [ref=e1926]: 修复了在 32 位机器下推实时音频流失败的问题
          - separator [ref=e1927]
          - heading "2.16.0 版本" [level=2] [ref=e1928]: 2.16.0 版本
          - paragraph [ref=e1929]:
            - strong [ref=e1930]: 发布日期：2022-02-17
          - paragraph [ref=e1931]:
            - strong [ref=e1932]: 新增功能
          - list [ref=e1933]:
            - listitem [ref=e1934]:
              - paragraph [ref=e1935]: 游戏语音支持设置是否接收指定用户的音频数据
              - paragraph [ref=e1936]: 游戏语音模块新增 [muteUser] 接口，本地用户可以根据需要，在初始化游戏语音 [createRangeAudio] 之后，通过 [muteUser] 接口设置是否接收指定远端用户的音频数据。
              - paragraph [ref=e1937]: 该功能常用于游戏场景，例如发声者被墙壁阻挡，则听众不需要接收该声音。
              - paragraph [ref=e1938]:
                - text: 相关 API 请参考
                - link "muteUser" [ref=e1939] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoRangeAudio/muteUser.html
            - listitem [ref=e1940]:
              - paragraph [ref=e1941]: 拉流质量回调 [onPlayerQualityUpdate] 中新增 MOS 音质评分
              - paragraph [ref=e1942]: "[onPlayerQualityUpdate] 回调新增 “mos” 参数，表示对拉流音质的评分。开发者对音频质量比较关注时，可通过该参数了解当前音频的质量情况。"
              - img [ref=e1944]
              - paragraph [ref=e1945]:
                - text: 相关 API 请参考
                - link "onPlayerQualityUpdate" [ref=e1946] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPlayerQualityUpdate.html
            - listitem [ref=e1947]:
              - paragraph [ref=e1948]: 支持基于 rtmp over quic 协议推流
              - paragraph [ref=e1949]: 注意：如需使用该功能，请联系 ZEGO 技术支持。
              - paragraph [ref=e1950]: 为了在弱网环境下让推流端可以推更优质的音频流，SDK 支持基于 rtmp over quic 协议来推流。
              - paragraph [ref=e1951]: 该功能常用于单主播直推 CDN、直播 PK 场景。
          - paragraph [ref=e1952]:
            - strong [ref=e1953]: 改进优化
          - list [ref=e1954]:
            - listitem [ref=e1955]:
              - paragraph [ref=e1956]: Android SDK 最低支持的操作系统版本从 Android 4.1 变更为 Android 4.4
              - paragraph [ref=e1957]: 从此版本开始 Android SDK 支持的 API 级别要求不低于 19，最低支持的操作系统版本从 Android 4.1 变更为 Android 4.4，如需支持 Android 4.1，请联系 ZEGO 技术支持。
            - listitem [ref=e1958]:
              - paragraph [ref=e1959]: 8.0 以上版本的 Android 系统支持获取 CPU 的使用率
            - listitem [ref=e1960]:
              - paragraph [ref=e1961]: 优化 NTP 时间误差
              - paragraph [ref=e1962]: 调用 [getNetworkTimeInfo] 接口获取同步网络时间信息时，SDK 会定时更新 NTP 时间，减少获取到的 NTP 时间误差。
              - paragraph [ref=e1963]:
                - text: 相关 API 请参考
                - link "getNetworkTimeInfo" [ref=e1964] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineUtilities/getNetworkTimeInfo.html
              - paragraph [ref=e1965]: "** 问题修复**"
            - listitem [ref=e1966]:
              - paragraph [ref=e1967]: 修复了同时调用 [loginRoom] 和 [startPublishingStream] 接口时，对端有概率出现收不到流新增通知的问题
            - listitem [ref=e1968]:
              - paragraph [ref=e1969]: 修复了用户无法接收到登录房间前该房间内其他用户发送的房间附加消息的问题
            - listitem [ref=e1970]:
              - paragraph [ref=e1971]: 修复已知问题
          - separator [ref=e1972]
          - heading "2.15.0 版本" [level=2] [ref=e1973]: 2.15.0 版本
          - paragraph [ref=e1974]:
            - strong [ref=e1975]: 发布日期：2021-12-15
          - paragraph [ref=e1976]:
            - strong [ref=e1977]: 新增功能
          - list [ref=e1978]:
            - listitem [ref=e1979]:
              - paragraph [ref=e1980]: 媒体播放器支持播放音乐时获取声浪和频谱
              - paragraph [ref=e1981]: 媒体播放器新增声浪频谱回调和开关接口，可以控制是否开启回调以及回调的频率，从而获取媒体播放器当前的声浪和频谱。在通过媒体播放器播放资源，如一起看电影、游戏语聊房场景时，通过该功能可以做频谱动画的功能，增加趣味性。
              - paragraph [ref=e1982]: 创建媒体播放器后，调用 [enableSoundLevelMonitor] 接口可以开启声浪监听，开启后可以通过 [onMediaPlayerSoundLevelUpdate] 回调监听声浪的变化。
              - paragraph [ref=e1983]: 创建媒体播放器后，调用 [enableFrequencySpectrumMonitor] 接口可以开启频谱监听，开启后可以通过 [onMediaPlayerSoundLevelUpdate] 回调监听频谱的变化。
              - paragraph [ref=e1984]:
                - text: 相关 API 请参考
                - link "enableSoundLevelMonitor" [ref=e1985] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/enableSoundLevelMonitor.html
                - text: ","
                - link "onMediaPlayerSoundLevelUpdate" [ref=e1986] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onMediaPlayerSoundLevelUpdate.html
                - text: ","
                - link "enableFrequencySpectrumMonitor" [ref=e1987] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/enableFrequencySpectrumMonitor.html
                - text: ","
                - link "onMediaPlayerFrequencySpectrumUpdate" [ref=e1988] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onMediaPlayerFrequencySpectrumUpdate.html
            - listitem [ref=e1989]:
              - paragraph [ref=e1990]: 支持全方位虚拟立体声
              - paragraph [ref=e1991]: 新增支持全方位虚拟立体声，将单声道的声音，通过算法处理，模拟成立体感的声音。该功能常用于 KTV 场景中，可以使唱歌的声音更加有立体感。
              - paragraph [ref=e1992]: 当调用 [enableVirtualStereo] 接口，将 angle 参数设置为 -1 时，表示立体声效果为全方位立体声。
              - paragraph [ref=e1993]:
                - text: 相关 API 请参考
                - link "enableVirtualStereo" [ref=e1994] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePreprocess/enableVirtualStereo.html
            - listitem [ref=e1995]:
              - paragraph [ref=e1996]: 新增本地设备异常回调 [onLocalDeviceExceptionOccurred]
              - paragraph [ref=e1997]: 通过 [onLocalDeviceExceptionOccurred] 回调可以设置要检测的设备类型，如摄像头、扬声器、麦克风等，开发者可以根据不同设备类型的错误回调进行相应的处理。
              - paragraph [ref=e1998]:
                - text: 相关 API 请参考
                - link "onLocalDeviceExceptionOccurred" [ref=e1999] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onLocalDeviceExceptionOccurred.html
          - paragraph [ref=e2000]:
            - strong [ref=e2001]: 改进优化
          - list [ref=e2002]:
            - listitem [ref=e2003]:
              - paragraph [ref=e2004]: 新增 1015032 错误码
              - paragraph [ref=e2005]: 登录房间导致网络测试停止，由于网络测试会占用带宽，请在登录房间之前进行。
            - listitem [ref=e2006]:
              - paragraph [ref=e2007]: 新增 1002066 错误码
              - paragraph [ref=e2008]: 用户登录房间时如果在服务器黑名单中，则会返回此错误码，表示禁止登录房间。
            - listitem [ref=e2009]:
              - paragraph [ref=e2010]: 新增 1004072 错误码
              - paragraph [ref=e2011]: 当使用 SDK 拉低延迟直播流时，若您未开通低延迟直播服务，则会返回此错误码。
          - paragraph [ref=e2012]:
            - strong [ref=e2013]: 问题修复
          - list [ref=e2014]:
            - listitem [ref=e2015]: 修复了调用 [startMixerTask] 可能出现崩溃的问题
          - paragraph [ref=e2016]:
            - strong [ref=e2017]: 废弃删除
          - list [ref=e2018]:
            - listitem [ref=e2019]:
              - paragraph [ref=e2020]: 废弃 [onDeviceError] 回调
              - paragraph [ref=e2021]: 为了让开发者直观的了解出现异常的设备类型以及具体的异常情况，在 2.15.0 及以上版本废弃了 [onDeviceError] 回调，请使用 [onLocalDeviceExceptionOccurred] 回调代替。
              - paragraph [ref=e2022]:
                - text: 相关 API 请参考
                - link "onLocalDeviceExceptionOccurred" [ref=e2023] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onLocalDeviceExceptionOccurred.html
          - separator [ref=e2024]
          - heading "2.14.0 版本" [level=2] [ref=e2025]: 2.14.0 版本
          - paragraph [ref=e2026]:
            - strong [ref=e2027]: 发布日期：2021-11-30
          - paragraph [ref=e2028]:
            - strong [ref=e2029]: 新增功能
          - list [ref=e2030]:
            - listitem [ref=e2031]:
              - paragraph [ref=e2032]: 新增实时有序数据功能
              - paragraph [ref=e2033]: 开发者在需要做远程控制、云游戏等指令分发时，通过实时信令，可以低延迟获取发布端消息。
              - paragraph [ref=e2034]:
                - text: 相关 API 请参考
                - link "createRealTimeSequentialDataManager" [ref=e2035] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineIM/createRealTimeSequentialDataManager.html
            - listitem [ref=e2036]:
              - paragraph [ref=e2037]: 新增 H.265 编解码异常通知
              - paragraph [ref=e2038]: 新增 H.265 解码性能不足的告警回调，在通过 CDN 拉流的场景下，用于提示用户是否做降级处理。如果开发者在拉 H.265 流的过程中收到低帧率回调 [onPlayerLowFpsWarning]，建议开发者停止拉 H.265 流，转拉 H.264 流。
              - paragraph [ref=e2039]: 推流状态回调 [onPublisherStateUpdate] 和拉流状态回调 [onPlayerStateUpdate] 中新增了 H.265 编解码错误提示。
              - paragraph [ref=e2040]:
                - text: 相关 API 请参考
                - link "onPlayerLowFpsWarning" [ref=e2041] [cursor=pointer]:
