              - generic [ref=e104]:
                - generic [ref=e105]: 说明
                - generic [ref=e106]:
                  - paragraph [ref=e107]: 假设存在 A、B、C 流：
                  - list [ref=e108]:
                    - listitem [ref=e109]: 当 SDK 正在拉流 A 时，A 切换到 B 再切换到 C 且在 switchTimeout 超时时间内切流均未成功，只有最后切换的 C 的 onPlayerSwitched 回调会返回切流失败的通知。
                    - listitem [ref=e110]: 当 SDK 正在拉流 A 且又切换到 A 时，switchTimeout 参数不生效，SDK 将按拉流超时时间来执行重试逻辑。
                    - listitem [ref=e111]: 当 A 切换到 B 又切换回 A 且 SDK 始终都在拉流 A，拉流 A 的操作将不会被中断。
              - paragraph [ref=e112]:
                - text: 相关 API 请参考：
                - link "switchPlayingStream" [ref=e113] [cursor=pointer]:
