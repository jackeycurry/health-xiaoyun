            - listitem [ref=e985]:
              - paragraph [ref=e986]: 优化网络连接策略，提升音视频通话体验
            - listitem [ref=e987]:
              - paragraph [ref=e988]: 优化前后台切换策略，解决某些特定场景或机型采集静音的问题
            - listitem [ref=e989]:
