              - list [ref=e637]:
                - listitem [ref=e638]: 若开发者在 3.17.0 版本之后，实现屏幕共享能力时没有声明权限，本次更新后必需主动声明权限，否则会出现兼容性问题。
                - listitem [ref=e639]: 如线上遇到兼容性问题，请联系 ZEGO 技术支持。
              - paragraph [ref=e640]: 为更符合隐私规范，删除 AndroidManifest.xml 文件中声明的屏幕共享默认权限，需开发者主动声明：
              - list [ref=e641]:
