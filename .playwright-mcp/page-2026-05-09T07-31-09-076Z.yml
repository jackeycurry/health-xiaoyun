            - listitem [ref=e1019]:
              - paragraph [ref=e1020]: 媒体播放器支持伴奏音质增强
              - paragraph [ref=e1021]: 媒体播放器支持伴奏音质增强，提升伴奏的音质以及现场的氛围感，适用于语聊房、K 歌等场景中。
              - paragraph [ref=e1022]:
                - text: 相关 API 请参考
                - link "enableLiveAudioEffect" [ref=e1023] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/enableLiveAudioEffect.html
            - listitem [ref=e1024]:
              - paragraph [ref=e1025]: 支持获取并上传音频的 Dump 文件
              - paragraph [ref=e1026]:
                - text: 注意：由于音频 Dump 文件属于用户的隐私敏感数据，因此开发者实现该能力时，请务必认真阅读
                - link "《即构隐私政策》" [ref=e1027] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/policies-and-agreements/zego-privacy-policy
                - text: 中关于 “使用音频 Dump 功能” 的内容。此外，在收集音频 Dump 文件时，请在获得用户授权同意时，同步注明 Express SDK 收集目的。
              - paragraph [ref=e1028]:
                - text: 支持将处理前后的音频数据保存下来并上传，用于定位音频相关问题、提高问题排查效率、缩短接入时间，详情请参考
                - link "如何获取、上传音频的 Dump 文件？" [ref=e1029] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/faq/audio-dump-handling
              - paragraph [ref=e1030]:
