              - paragraph [ref=e678]: 注意：如需使用该功能，请联系 ZEGO 技术支持。
              - paragraph [ref=e679]:
                - text: 在 10ms 延迟下，依然保持纯净的降噪效果以及高保真的人声音质，适用于游戏语音、游戏开黑、实时合唱等对延迟较为敏感的场景，目前 AI 降噪已支持均衡模式、低延迟模式以及轻量模式，详情请参考
                - link "场景化 AI 降噪" [ref=e680] [cursor=pointer]:
                  - /url: /real-time-voice-flutter/audio/scenario-based-ai-noise-reduction
                - text: 。
