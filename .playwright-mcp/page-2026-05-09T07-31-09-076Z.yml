                - listitem [ref=e643]:
                  - text: 如果目标 Android SDK 版本是 34.0.0 及以后版本，需要设置
                  - code [ref=e644]: FOREGROUND_SERVICE
                  - text: 及
                  - code [ref=e645]: FOREGROUND_SERVICE_MEDIA_PROJECTION
                  - text: 权限声明。
              - paragraph [ref=e646]: 详情请参考 [屏幕共享] 文档。
