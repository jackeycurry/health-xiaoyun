                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePublisher/setMinVideoBitrateForTrafficControl.html
                - text: ","
                - link "setMinVideoFpsForTrafficControl" [ref=e1336] [cursor=pointer]:
