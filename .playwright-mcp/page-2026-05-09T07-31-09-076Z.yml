          - heading "2.13.0 版本" [level=2] [ref=e2083]: 2.13.0 版本
          - paragraph [ref=e2084]:
            - strong [ref=e2085]: 发布日期：2021-11-17
          - paragraph [ref=e2086]:
            - strong [ref=e2087]: 新增功能
          - list [ref=e2088]:
            - listitem [ref=e2089]:
              - paragraph [ref=e2090]:
                - text: Flutter 的功能已对齐 Native SDK
                - link "2.13.0" [ref=e2091] [cursor=pointer]:
                  - /url: /real-time-video-android-java/client-sdk/release-notes
                - text: 版本
              - paragraph [ref=e2092]:
                - text: 支持基础推拉流、登录多房间、房间实时消息、音视频直播、3A 处理、CDN 直推转推、混流、媒体播放器、音效播放器、游戏语音、流量控制、用户控制权限等功能，详情请参考
                - link "概述" [ref=e2093] [cursor=pointer]:
                  - /url: /real-time-video-flutter/introduction/overview
                - text: 。
              - paragraph [ref=e2094]: 暂不支持定义视频采集、自定义视频渲染、自定义视频前处理、混音功能。
              - paragraph [ref=e2095]:
                - text: 相关 API 请参考
                - link "客户端 API" [ref=e2096] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/article/3550
          - paragraph [ref=e2097]:
            - strong [ref=e2098]: 改进优化
          - list [ref=e2099]:
            - listitem [ref=e2100]:
              - paragraph [ref=e2101]: 去测试环境
              - paragraph [ref=e2102]:
                - text: 为了降低开发者对环境的理解成本，ZEGO 已统一环境概念，从该版本开始，废弃了测试环境，统一使用正式环境。在 2.13.0 版本之前已接入过 SDK 的开发者，可以参考
                - link "测试环境废弃说明" [ref=e2103] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/real-time-voice-android/introduction/abandon-test-environment
                - text: 进行 SDK 升级及代码调整。
              - paragraph [ref=e2104]:
                - text: 相关 API 请参考
                - link "createEngineWithProfile" [ref=e2105] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/createEngineWithProfile.html
          - paragraph [ref=e2106]:
            - strong [ref=e2107]: 废弃删除
          - list [ref=e2108]:
            - listitem [ref=e2109]:
              - paragraph [ref=e2110]: 废弃旧的 [createEngine] 接口
              - paragraph [ref=e2111]: 为了降低开发者对环境的理解，废弃了掉测试环境，统一使用环境。在 2.13.0 及以上版本废弃了原有的 [createEngine] 接口，请使用 [createEngineWithProfile] 接口代替。
