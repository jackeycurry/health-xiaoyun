                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/submitLog.html
            - listitem [ref=e1213]:
              - paragraph [ref=e1214]: 优化 SDK 的内部逻辑，提升弱网环境下的通话体验
          - paragraph [ref=e1215]:
            - strong [ref=e1216]: 问题修复
          - list [ref=e1217]:
            - listitem [ref=e1218]:
              - paragraph [ref=e1219]: 修复 MediaRecorder、AudioObserver 停止推流后，未恢复本地推流，继续采集的问题
            - listitem [ref=e1220]:
              - paragraph [ref=e1221]: 修复 NetMonitor 模块多线程死锁的问题
          - separator [ref=e1222]
          - heading "3.6.1 版本" [level=2] [ref=e1223]: 3.6.1 版本
          - paragraph [ref=e1224]:
            - strong [ref=e1225]: 发布日期： 2023-07-03
          - paragraph [ref=e1226]:
            - strong [ref=e1227]: 问题修复
          - list [ref=e1228]:
            - listitem [ref=e1229]:
              - text: 修复调用
              - link "setRoomExtraInfo" [ref=e1230] [cursor=pointer]:
                - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineRoom/setRoomExtraInfo.html
              - text: 接口直接报错的问题
          - separator [ref=e1231]
          - heading "3.6.0 版本" [level=2] [ref=e1232]: 3.6.0 版本
          - paragraph [ref=e1233]:
            - strong [ref=e1234]: 发布日期： 2023-06-21
          - paragraph [ref=e1235]:
            - strong [ref=e1236]: 新增功能
          - list [ref=e1237]:
            - listitem [ref=e1238]:
              - paragraph [ref=e1239]: 新增 Enhanced KTV 混响效果
              - paragraph [ref=e1240]: 新增增强型 KTV 混响效果，实现更集中、亮度更好的 KTV 人声效果。与之前的 KTV 混响音效相比，Enhanced KTV 混响效果缩短了混响时长，提高了干湿比。
              - paragraph [ref=e1241]: 原有的 KTV 混响音效仅适用于人声瑕疵较为明显的用户，增强型 KTV 混响效果适用于大多数专业用户和普通用户。
              - paragraph [ref=e1242]:
                - text: 相关 API 请参考
                - link "setReverbPreset" [ref=e1243] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEnginePreprocess/setReverbPreset.html
            - listitem [ref=e1244]:
              - paragraph [ref=e1245]: 游戏语音功能支持媒体播放器&音效播放器使用 3D 音效
              - paragraph [ref=e1246]: 开发者可以通过设置媒体播放器、音效播放器的位置和朝向，实现本地音频、在线音频资源的 3D 音效。该功能可用于在虚拟场景中设置物品的音效、以及指定位置的背景音乐等。
              - paragraph [ref=e1247]:
                - text: 相关 API 请参考
                - link "ZegoMediaPlayer > updatePosition" [ref=e1248] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/updatePosition.html
                - text: ","
                - link "ZegoAudioEffectPlayer > updatePosition" [ref=e1249] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoAudioEffectPlayer/updatePosition.html
            - listitem [ref=e1250]:
              - paragraph [ref=e1251]: 媒体播放器倍速功能最大支持 4 倍速
              - paragraph [ref=e1252]: 媒体播放器倍速的上限提升到 4 倍速。例如，用户在播放音视频文件时，如果已设置为 2 倍速播放，长按屏幕时可以加速至 4 倍速。
              - paragraph [ref=e1253]:
                - text: 相关 API 请参考
                - link "ZegoMediaPlayer > setPlaySpeed" [ref=e1254] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/setPlaySpeed.html
            - listitem [ref=e1255]:
              - paragraph [ref=e1256]: 媒体播放器支持边下载、边回调数据解密、边播放的功能
              - paragraph [ref=e1257]: 针对在线播放器的版权音乐保护，媒体播放器支持边下载边回调未解密的二进制数据，由开发者解密后再传回媒体播放器播放，过程中不会产生文件或缓存文件。
              - paragraph [ref=e1258]:
                - text: 相关 API 请参考
                - link "ZegoMediaPlayer > enableBlockData" [ref=e1259] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoMediaPlayer/enableBlockData.html
          - paragraph [ref=e1260]:
            - strong [ref=e1261]: 改进优化
          - list [ref=e1262]:
            - listitem [ref=e1263]:
              - text: 调整
              - link "ZegoScreenCaptureConfig" [ref=e1264] [cursor=pointer]:
                - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoScreenCaptureConfig-class.html
              - text: 类中的 applicationVolume 和 microphoneVolume 字段变成可选字段，扩大 SDK 的多端兼容性
          - paragraph [ref=e1265]:
            - strong [ref=e1266]: 问题修复
          - list [ref=e1267]:
            - listitem [ref=e1268]: 修复使用媒体播放器时可能会导致内存泄露的问题
          - separator [ref=e1269]
          - heading "3.5.0 版本" [level=2] [ref=e1270]: 3.5.0 版本
          - paragraph [ref=e1271]:
            - strong [ref=e1272]: 发布日期： 2023-05-19
          - paragraph [ref=e1273]:
            - strong [ref=e1274]: 新增功能
          - list [ref=e1275]:
            - listitem [ref=e1276]:
              - paragraph [ref=e1277]: 新增音视频推流的首帧回调
              - paragraph [ref=e1278]:
                - text: 在进行音视频推流时，通过
                - link "onPublisherSendAudioFirstFrame" [ref=e1279] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPublisherSendAudioFirstFrame.html
                - text: 、
                - link "onPublisherSendVideoFirstFrame" [ref=e1280] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPublisherSendVideoFirstFrame.html
                - text: 回调，监听“首帧音频”或“首帧视频”的发布时机。该功能可用于统计音视频推流的耗时、或更新 UI 表现等。
              - paragraph [ref=e1281]:
                - text: 相关 API 请参考
                - link "onPublisherSendAudioFirstFrame" [ref=e1282] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPublisherSendAudioFirstFrame.html
                - text: ","
                - link "onPublisherSendVideoFirstFrame" [ref=e1283] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onPublisherSendVideoFirstFrame.html
            - listitem [ref=e1284]:
              - paragraph [ref=e1285]: 媒体播放器支持音视频渲染完成后的首帧回调
              - paragraph [ref=e1286]:
                - text: 在通过媒体播放器进行音视频渲染时，通过
                - link "onMediaPlayerFirstFrameEvent" [ref=e1287] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onMediaPlayerFirstFrameEvent.html
                - text: 回调，监听渲染完成后的“首帧音频”或“首帧视频”的发布时机。该功能可用于音视频渲染的耗时、或更新 UI 表现等。
              - paragraph [ref=e1288]:
                - text: 相关 API 请参考
                - link "onMediaPlayerFirstFrameEvent" [ref=e1289] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/onMediaPlayerFirstFrameEvent.html
            - listitem [ref=e1290]:
              - paragraph [ref=e1291]: 外部采集支持主动偏移 NTP 时间戳
              - paragraph [ref=e1292]: 注意：如需使用该功能，请联系 ZEGO 技术支持。
              - paragraph [ref=e1293]: 使用外部采集功能时，支持通过实验性 API 接口主动偏移 NTP 时间戳。该功能可用于 KTV 的合唱、伴奏、歌词对齐等场景。
            - listitem [ref=e1294]:
              - paragraph [ref=e1295]: 多房间模式下支持快速切换房间
              - paragraph [ref=e1296]:
                - text: 多房间模式下，支持通过
                - link "switchRoom" [ref=e1297] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineRoom/switchRoom.html
                - text: 接口，快速便捷地实现切换房间的功能。
              - paragraph [ref=e1298]:
                - text: 相关 API 请参考
                - link "switchRoom" [ref=e1299] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngineRoom/switchRoom.html
          - paragraph [ref=e1300]:
            - strong [ref=e1301]: 改进优化
          - list [ref=e1302]:
            - listitem [ref=e1303]:
              - paragraph [ref=e1304]: 大幅度减少 SDK 的 iOS 设备内存消耗
              - paragraph [ref=e1305]: 该优化从 3.5.0 版本开始生效，不需要额外接口。
          - paragraph [ref=e1306]:
            - strong [ref=e1307]: 问题修复
          - list [ref=e1308]:
            - listitem [ref=e1309]:
              - paragraph [ref=e1310]: 修复媒体播放器在部分 m3u8 文件格式中，不能通过 seekTo 接口使播放进度跳转到 0 的问题
            - listitem [ref=e1311]:
              - paragraph [ref=e1312]: 修复 Android 内存用量信息不更新的问题
          - separator [ref=e1313]
          - heading "3.4.2 版本" [level=2] [ref=e1314]: 3.4.2 版本
          - paragraph [ref=e1315]:
            - strong [ref=e1316]: 发布日期： 2023-04-26
          - paragraph [ref=e1317]:
            - strong [ref=e1318]: 新增功能
          - list [ref=e1319]:
            - listitem [ref=e1320]:
              - paragraph [ref=e1321]: 新增地理围栏功能
              - paragraph [ref=e1322]: 注意：
              - list [ref=e1323]:
                - listitem [ref=e1324]: 如需使用该功能，请联系 ZEGO 技术支持。
                - listitem [ref=e1325]: 请在创建引擎之前，配置地理围栏信息。
              - paragraph [ref=e1326]:
                - text: 将音视频及信令数据访问限定在某一区域，用以满足地区数据隐私安全相关法规，即限定用户访问某一特定区域的音视频服务，详情请参考
                - link "地理围栏" [ref=e1327] [cursor=pointer]:
                  - /url: /real-time-voice-flutter/communication/geofencing
                - text: 。
              - paragraph [ref=e1328]:
                - text: 相关 API 请参考
                - link "setGeoFence" [ref=e1329] [cursor=pointer]:
                  - /url: https://doc-zh.zego.im/unique-api/express-video-sdk/zh/dart_flutter/zego_express_engine/ZegoExpressEngine/setGeoFence.html
            - listitem [ref=e1330]:
              - paragraph [ref=e1331]: 支持动态切换流控策略
              - paragraph [ref=e1332]: 支持动态开关流量控制功能，同时支持设置流量控制属性等。
              - paragraph [ref=e1333]:
