                - generic [ref=e210]:
                  - heading "模型选型" [level=2] [ref=e211]
                  - paragraph [ref=e212]: Qwen3.5-Omni-Realtime 是千问最新推出的实时多模态模型，相比于上一代的 Qwen3-Omni-Flash-Realtime：
                  - list [ref=e213]:
                    - listitem [ref=e214]:
                      - paragraph [ref=e215]: 智能水平
                      - paragraph [ref=e216]: 模型智力大幅提升，与 Qwen3.5-Plus 智能水平相当。
                    - listitem [ref=e217]:
                      - paragraph [ref=e218]: 联网搜索
                      - paragraph [ref=e219]:
                        - text: 原生支持联网搜索（WebSearch），模型可自主判断是否需要搜索来回应即时问题。详见
                        - link "联网搜索" [ref=e220] [cursor=pointer]:
                          - /url: "#a8b2c3d4e5s6h"
                        - text: 。
                    - listitem [ref=e221]:
                      - paragraph [ref=e222]: 工具调用
                      - paragraph [ref=e223]:
                        - text: 支持 Function Calling，模型可自主判断是否需要调用外部工具，实现与外部系统的交互。详见
                        - link "Qwen-Omni-Realtime 系列" [ref=e224] [cursor=pointer]:
                          - /url: https://help.aliyun.com/zh/model-studio/qwen-function-calling#rt02realtime01
                        - text: 。
                    - listitem [ref=e225]:
                      - paragraph [ref=e226]: 语义打断
                      - paragraph [ref=e227]: 自动识别对话意图，避免附和声和无意义背景音触发打断。
                    - listitem [ref=e228]:
                      - paragraph [ref=e229]: 语音控制
                      - paragraph [ref=e230]: 通过语音指令控制声音大小、语速和情绪，如“语速快一些”、“声音大一些”、“用开心的语气”等。
                    - listitem [ref=e231]:
                      - paragraph [ref=e232]: 支持的语言
                      - paragraph [ref=e233]:
                        - text: 支持
                        - link "113 种语种和方言" [ref=e234] [cursor=pointer]:
                          - /url: https://help.aliyun.com/zh/model-studio/qwen-omni#model-comparison-table
                        - text: 的语音识别，以及
                        - link "36 种语种和方言" [ref=e235] [cursor=pointer]:
                          - /url: https://help.aliyun.com/zh/model-studio/qwen-omni#model-comparison-table
                        - text: 的语音生成。
                    - listitem [ref=e236]:
                      - paragraph [ref=e237]: 支持的音色
                      - paragraph [ref=e238]:
                        - text: 支持 55 种音色（47 种多语言 + 8 种方言），具体可查看
                        - link "音色列表" [ref=e239] [cursor=pointer]:
                          - /url: "#f4c9fd97f221z"
                        - text: 。
                    - listitem [ref=e240]:
                      - paragraph [ref=e241]: 声音复刻
                      - paragraph [ref=e242]:
                        - text: qwen3.5-omni-plus-realtime 和 qwen3.5-omni-flash-realtime 支持声音复刻功能，可使用自定义音色进行实时对话。详见
                        - link "声音复刻" [ref=e243] [cursor=pointer]:
                          - /url: https://help.aliyun.com/zh/model-studio/qwen-omni-voice-cloning
                        - text: 。
                  - blockquote [ref=e244]:
                    - text: 模型的名称、上下文、价格、快照版本等信息请参见百炼控制台；并发限流条件请参考
                    - link "限流" [ref=e245] [cursor=pointer]:
